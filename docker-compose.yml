services:
  interviewapp-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interviewapp_backend
    ports:
      - "3013:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=sbts_postgres
      - DB_PORT=5432
      - DB_NAME=sbts_db
      - DB_USER=sbts_user
      - DB_PASSWORD=LbePDtWSSkXOc5yN0ZlDw00zf
      - JWT_SECRET=student-portal-secret-key-change-in-production-2024
    networks:
      - default
      - sbts_network
    restart: unless-stopped
    depends_on:
      - check-db
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  interviewapp-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3013/api
    container_name: interviewapp_frontend
    ports:
      - "3012:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3013/api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - interviewapp-backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  check-db:
    image: postgres:15-alpine
    container_name: interviewapp_db_check
    command: ["sh", "-c", "until pg_isready -h sbts_postgres -p 5432; do sleep 2; done; exit 0"]
    networks:
      - default
      - sbts_network
    restart: "no"

  whisper-service:
    build:
      context: ./ai-services
      dockerfile: Dockerfile.whisper
    container_name: interviewapp_whisper
    ports:
      - "8001:8001"
    volumes:
      - whisper-models:/root/.cache/whisper
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ollama-service:
    build:
      context: ./ai-services
      dockerfile: Dockerfile.ollama
    container_name: interviewapp_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  analysis-service:
    build:
      context: ./ai-services
      dockerfile: Dockerfile.analysis
    container_name: interviewapp_analysis
    ports:
      - "8002:8002"
    depends_on:
      - ollama-service
    environment:
      - OLLAMA_URL=http://ollama-service:11434
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  whisper-models:
  ollama-models:

networks:
  sbts_network:
    external: true
    name: icbmtraining_sbts_network
