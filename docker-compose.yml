services:
  interviewapp-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interviewapp_backend
    ports:
      - "3081:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-student-portal-secret-key-change-in-production-2024}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SOURCE_API_URL=https://icbm.dbi.edu.ng/api-proxy
      - INTERNAL_API_KEY=student-portal-internal-key-2024
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    networks:
      - default
      - sbts_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  interviewapp-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3081/api
    container_name: interviewapp_frontend
    ports:
      - "3080:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3081/api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - interviewapp-backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  sbts_network:
    external: true
    name: icbmtraining_sbts_network
