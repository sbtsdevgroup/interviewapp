name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install Backend Dependencies
        run: npm install
        working-directory: ./backend

      - name: Lint Backend
        run: npm run lint
        working-directory: ./backend

      - name: Test Backend
        run: npm test
        working-directory: ./backend

      - name: Audit Backend
        run: npm audit --audit-level=high
        working-directory: ./backend

      - name: Install Frontend Dependencies
        run: npm install
        working-directory: ./frontend

      - name: Lint Frontend
        run: npm run lint
        working-directory: ./frontend

      - name: Audit Frontend
        run: npm audit --audit-level=high
        working-directory: ./frontend

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Lint Backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

      - name: Build and Scan Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/interviewapp-backend:${{ github.sha }}

      - name: Scan Backend Image for Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_HUB_USERNAME }}/interviewapp-backend:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Build and Scan Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          load: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/interviewapp-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Scan Frontend Image for Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_HUB_USERNAME }}/interviewapp-frontend:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Images to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/interviewapp-backend:${{ github.sha }}
          docker tag ${{ secrets.DOCKER_HUB_USERNAME }}/interviewapp-backend:${{ github.sha }} ${{ secrets.DOCKER_HUB_USERNAME }}/interviewapp-backend:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/interviewapp-backend:latest
          
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/interviewapp-frontend:${{ github.sha }}
          docker tag ${{ secrets.DOCKER_HUB_USERNAME }}/interviewapp-frontend:${{ github.sha }} ${{ secrets.DOCKER_HUB_USERNAME }}/interviewapp-frontend:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/interviewapp-frontend:latest

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/interviewapp
            docker-compose pull
            docker-compose up -d
